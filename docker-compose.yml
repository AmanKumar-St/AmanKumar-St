version: '3.8'

services:
  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - landing-page
      - frontend-react
      - backend-node
      - backend-python
    networks:
      - portfolio-network

  landing-page:
    build:
      context: ./landing-page
    networks:
      - portfolio-network

  frontend-react:
    build:
      context: ./frontend-react
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - portfolio-network

  backend-node:
    build:
      context: ./backend-node
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-portfolio}
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio-network

  backend-python:
    build:
      context: ./backend-python
    volumes:
      - ./backend-python:/app
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-portfolio}
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

volumes:
  pgdata:

networks:
  portfolio-network:
    driver: bridge
